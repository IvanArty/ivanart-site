<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ivan Art</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      max-width: 720px;
      width: 100%;
      padding: 48px 32px;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      background: #181818;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 42px;
      line-height: 1.1;
    }

    p {
      margin: 12px 0;
      font-size: 18px;
      line-height: 1.6;
      color: #cfcfcf;
    }

    .small {
      margin-top: 28px;
      font-size: 15px;
      color: #9a9a9a;
    }

    a {
      color: #ffffff;
      text-decoration: none;
      border-bottom: 1px solid #666;
    }

    a:hover {
      border-bottom-color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ivan Art</h1>
    <p>Website in progress.</p>
    <p>
      A personal space for portfolio, print & design insights, and life notes.
    </p>
    <p>
      For now, you can contact me at
      <a href="mailto:info@ivanart.co.uk">info@ivanart.co.uk</a>
    </p>
    <p class="small">
      Full website coming soon.
    </p>
  </div>
</body>
</html>
